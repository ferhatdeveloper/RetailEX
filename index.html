<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetailEx</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f1113;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    #app-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background-color: #0f1113;
      color: #fff;
      transition: opacity 0.3s ease-out;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      position: relative;
    }

    .logo-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      background: #3b82f6;
      filter: blur(80px);
      opacity: 0.15;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .logo-svg {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }

    .logo-text {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .logo-text .retail {
      color: #fff;
    }

    .logo-text .ex {
      color: #3b82f6;
      font-style: italic;
      margin-left: 2px;
    }

    .loading-bar-container {
      width: 180px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .loading-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      animation: loading-slide 1.5s infinite ease-in-out;
    }

    .pulse-animation {
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes loading-slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>
  <div id="app-loader">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <svg viewBox="0 0 100 100" class="logo-svg">
        <defs>
          <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#8b5cf6" />
          </linearGradient>
          <filter id="loaderGlow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
              <feMergeNode in="coloredBlur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <path d="M50 5 L89 27.5 L89 72.5 L50 95 L11 72.5 L11 27.5 Z" fill="none" stroke="url(#loaderGrad)"
          stroke-width="2" stroke-linejoin="round" opacity="0.4" />
        <path d="M35 35 L65 35 L65 45 L45 45 L45 55 L65 55 L65 65 L35 65 Z" fill="url(#loaderGrad)"
          filter="url(#loaderGlow)" class="pulse-animation" />
        <rect x="70" y="35" width="8" height="30" fill="url(#loaderGrad)" rx="2" opacity="0.8" />
      </svg>
      <div class="logo-text">
        <span class="retail">Retail</span><span class="ex">Ex</span>
      </div>
    </div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Sistem Hazırlanıyor...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove loader when app is mounted
    window.removeLoader = function () {
      const loader = document.getElementById('app-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.remove();
        }, 300);
      }
    };
    // Safety net: auto-remove splash after 8 seconds even if React fails to mount
    setTimeout(function () {
      if (document.getElementById('app-loader')) {
        console.warn('[Splash] Auto-removing splash after timeout');
        window.removeLoader();
      }
    }, 8000);
  </script>
</body>

</html>
